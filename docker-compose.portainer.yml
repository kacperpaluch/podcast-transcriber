# ============================================================
#  Podcast Transcriber — Docker Compose dla Portainer
#  Obrazy pobierane automatycznie z Docker Hub (kpa90/podcast-*)
#  Nie wymaga budowania lokalnego.
#
#  JEDYNA zmienna do ustawienia: HOST_DATA_PATH
#  Ustaw ją w Portainer → Stacks → (twój stack) → Environment variables
#  Przykład: HOST_DATA_PATH = /opt/podcast-transcriber/data
# ============================================================

name: podcast

services:
  web:
    image: kpa90/podcast-web:latest
    container_name: podcast-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - podcast_data:/data
    environment:
      - DB_PATH=/data/app.db
    mem_limit: 300m

  scheduler:
    image: kpa90/podcast-scheduler:latest
    container_name: podcast-scheduler
    restart: unless-stopped
    volumes:
      - podcast_data:/data
    environment:
      - DB_PATH=/data/app.db
    mem_limit: 200m

  worker-controller:
    image: kpa90/podcast-worker-controller:latest
    container_name: podcast-worker-controller
    restart: unless-stopped
    volumes:
      - podcast_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DB_PATH=/data/app.db
      - TRANSCRIBER_IMAGE=kpa90/podcast-transcriber:latest
      - HOST_DATA_PATH=${HOST_DATA_PATH}
    mem_limit: 200m

volumes:
  podcast_data:
